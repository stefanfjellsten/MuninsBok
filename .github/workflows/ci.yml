name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma generated client
        uses: actions/cache@v5
        with:
          path: packages/db/src/generated
          key: prisma-${{ hashFiles('packages/db/prisma/schema.prisma') }}

      - name: Generate Prisma client
        run: pnpm --filter @muninsbok/db exec prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build all packages
        run: pnpm -r build

      - name: Lint
        run: npx eslint .

      - name: Check formatting
        run: npx prettier --check .

      - name: Type check
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm -r test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: muninsbok
          POSTGRES_PASSWORD: muninsbok
          POSTGRES_DB: muninsbok
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U muninsbok"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://muninsbok:muninsbok@localhost:5432/muninsbok
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-jwt-signing

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @muninsbok/db exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @muninsbok/db exec prisma migrate deploy

      - name: Build all packages
        run: pnpm -r build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
